<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to 77B loading...</title>
  <style>
    /* 页面全屏居中样式 */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #e0f7fa, #fafafa);
      font-family: Arial, sans-serif;
      color: #333;
      overflow: hidden;
    }
    .loading {
      text-align: center;
    }
    .logo {
      width: 80px; /* 可根据实际图片调整 */
      margin-bottom: 15px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #ccc;
      border-top-color: #2196f3;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="loading">
  <!-- 替换 src 为你的 logo 图片 -->
  <img class="logo" src="logo.png" alt="Logo">
  <div class="spinner"></div>
  <div>loading...</div>
</div>

<script>
  const redirectURL = "https://www.77bccc.org/home?affiliateCode=shixiao666";
  let scriptLoaded = false, pixelLoaded = false;

  function tryRedirect() {
    if (scriptLoaded && pixelLoaded) {
      setTimeout(() => {
        window.location.href = redirectURL;
      }, 200); // 延迟 0.2 秒跳转
    }
  }

  // 加载统计脚本
  const script = document.createElement('script');
  script.src = "https://analytics.fatfish.cc/script.php?site_id=18";
  script.onload = () => { scriptLoaded = true; tryRedirect(); };
  script.onerror = () => { scriptLoaded = true; tryRedirect(); };
  document.head.appendChild(script);

  // 最多等 0.9 秒后强制跳转
  setTimeout(() => {
    if (!scriptLoaded || !pixelLoaded) {
      window.location.href = redirectURL;
    }
  }, 900);
</script>

</body>
</html>
